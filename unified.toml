[workspace]
name = "my-workspace"

[settings]
git_fetch_with_cli = false
parallel = 4
shallow = false
manage_gitignore = true
manage_vscode = true

[repos]
test-repo = { # this is allowed in toml 1.1 https://github.com/toml-lang/toml/releases/tag/1.1.0
    url = "./crates/un-cli/tests/test_data/source", 
    path = "crates/un-cli/tests/repos/test-repo" 
}

hello-world = {
    url = "https://github.com/octocat/Hello-World.git",
    path = "tests/repos/hello-world",
    branch = "master"
}

[artifacts]
jq = {
    url = "https://github.com/jqlang/jq/releases/download/jq-1.8.1/jq-linux-amd64",
    path = "tests/downloads/jq"
}
